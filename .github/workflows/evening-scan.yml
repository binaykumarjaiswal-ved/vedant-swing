name: Vedant Swing Evening Scan

on:
  schedule:
    - cron: "15 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evening-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run Nifty 500 evening scan
        env:
          STOCK_SCAN_LIMIT: "500"
          EMAIL_ENABLED: "false"
        run: python evening_scan.py
      - name: Save results
        run: |
          git config user.name "vedant-swing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/reports/
          git diff --staged --quiet || git commit -m "evening-scan: $(date -u +%Y-%m-%d-%H:%M UTC)"
          git push