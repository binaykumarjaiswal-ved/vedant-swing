name: Vedant Swing Alert Check

on:
  schedule:
    - cron: "*/30 3-10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check price alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ENABLED: "false"
        run: python check_alerts.py
      - name: Save alert state
        run: |
          git config user.name "vedant-swing-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/alerts.json data/alert_log.json
          git diff --staged --quiet || git commit -m "alerts: $(date -u +%Y-%m-%d-%H:%M UTC)"
          git push