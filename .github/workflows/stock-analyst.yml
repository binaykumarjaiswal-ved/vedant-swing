name: Stock Analyst (Primary)

on:
  schedule:
    - cron: "10 3 * * 1-5"   # 8:40 AM IST morning
    - cron: "20 3 * * 1-5"   # 8:50 AM IST morning backup
    - cron: "25 3 * * 1-5"   # 8:55 AM IST morning backup
    - cron: "40 3 * * 1-5"   # 9:10 AM IST morning backup
    - cron: "0 4 * * 1-5"    # 9:30 AM IST morning backup
    - cron: "45 3 * * 1-5"   # 9:15 IST intraday
    - cron: "55 3 * * 1-5"   # 9:25 IST
    - cron: "5 4 * * 1-5"    # 9:35 IST
    - cron: "15 4 * * 1-5"   # 9:45 IST
    - cron: "25 4 * * 1-5"   # 9:55 IST
    - cron: "35 4 * * 1-5"   # 10:05 IST
    - cron: "45 4 * * 1-5"   # 10:15 IST
    - cron: "55 4 * * 1-5"   # 10:25 IST
    - cron: "5 5 * * 1-5"    # 10:35 IST
    - cron: "15 5 * * 1-5"   # 10:45 IST
    - cron: "25 5 * * 1-5"   # 10:55 IST
    - cron: "35 5 * * 1-5"   # 11:05 IST
    - cron: "45 5 * * 1-5"   # 11:15 IST
    - cron: "55 5 * * 1-5"   # 11:25 IST
    - cron: "5 6 * * 1-5"    # 11:35 IST
    - cron: "15 6 * * 1-5"   # 11:45 IST
    - cron: "25 6 * * 1-5"   # 11:55 IST
    - cron: "35 6 * * 1-5"   # 12:05 IST
    - cron: "45 6 * * 1-5"   # 12:15 IST
    - cron: "55 6 * * 1-5"   # 12:25 IST
    - cron: "5 7 * * 1-5"    # 12:35 IST
    - cron: "15 7 * * 1-5"   # 12:45 IST
    - cron: "25 7 * * 1-5"   # 12:55 IST
    - cron: "35 7 * * 1-5"   # 13:05 IST
    - cron: "45 7 * * 1-5"   # 13:15 IST
    - cron: "55 7 * * 1-5"   # 13:25 IST
    - cron: "5 8 * * 1-5"    # 13:35 IST
    - cron: "15 8 * * 1-5"   # 13:45 IST
    - cron: "25 8 * * 1-5"   # 13:55 IST
    - cron: "35 8 * * 1-5"   # 14:05 IST
    - cron: "45 8 * * 1-5"   # 14:15 IST
    - cron: "55 8 * * 1-5"   # 14:25 IST
    - cron: "5 9 * * 1-5"    # 14:35 IST
    - cron: "15 9 * * 1-5"   # 14:45 IST
    - cron: "25 9 * * 1-5"   # 14:55 IST
    - cron: "35 9 * * 1-5"   # 15:05 IST
    - cron: "45 9 * * 1-5"   # 15:15 IST
  workflow_dispatch:
  repository_dispatch:
    types: [stock-analyst-run]

permissions:
  contents: write

concurrency:
  group: stock-analyst-main
  cancel-in-progress: false

jobs:
  stock-analyst-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stock Analyst loop
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STOCK_SCAN_LIMIT: "100"
          CHECK_INTERVAL_MIN: "10"
          JOB_MODE: auto
          CLOUD_PROVIDER: github
          CLOUD_ROLE: primary
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python run_loop.py

      - name: Save state (Loop 3)
        run: |
          git config user.name "stock-analyst-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "state: $(date -u +%Y-%m-%d-%H:%M UTC)"
          git push